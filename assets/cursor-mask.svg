<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pixelated Guy Fawkes mask cursor companion.
  14x14 grid · crisp-edge rendering for true pixel-art feel.
  W = face bone (#e8dec8), B = ink black (#0a0a10), R = cheek rose (#c8425c)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 14" shape-rendering="crispEdges" width="22" height="22">
  <!-- Face (bone) -->
  <rect x="3" y="0" width="8" height="1" fill="#e8dec8"/>
  <rect x="2" y="1" width="10" height="1" fill="#e8dec8"/>
  <rect x="1" y="2" width="12" height="1" fill="#e8dec8"/>
  <rect x="1" y="3" width="12" height="1" fill="#e8dec8"/>
  <rect x="0" y="4" width="14" height="1" fill="#e8dec8"/>
  <rect x="0" y="5" width="14" height="1" fill="#e8dec8"/>
  <rect x="0" y="6" width="14" height="1" fill="#e8dec8"/>
  <rect x="0" y="7" width="14" height="1" fill="#e8dec8"/>
  <rect x="1" y="8" width="12" height="1" fill="#e8dec8"/>
  <rect x="1" y="9" width="12" height="1" fill="#e8dec8"/>
  <rect x="2" y="10" width="10" height="1" fill="#e8dec8"/>
  <rect x="3" y="11" width="8" height="1" fill="#e8dec8"/>

  <!-- Eyebrows (black, arched outward) -->
  <rect x="2" y="3" width="2" height="1" fill="#0a0a10"/>
  <rect x="10" y="3" width="2" height="1" fill="#0a0a10"/>
  <rect x="1" y="4" width="2" height="1" fill="#0a0a10"/>
  <rect x="11" y="4" width="2" height="1" fill="#0a0a10"/>

  <!-- Eyes (black) -->
  <rect x="3" y="5" width="2" height="2" fill="#0a0a10"/>
  <rect x="9" y="5" width="2" height="2" fill="#0a0a10"/>

  <!-- Cheek rose dots -->
  <rect x="1" y="7" width="1" height="1" fill="#c8425c"/>
  <rect x="12" y="7" width="1" height="1" fill="#c8425c"/>

  <!-- Mustache (pencil-thin, curling up at ends) -->
  <rect x="2" y="8" width="1" height="1" fill="#0a0a10"/>
  <rect x="11" y="8" width="1" height="1" fill="#0a0a10"/>
  <rect x="3" y="9" width="2" height="1" fill="#0a0a10"/>
  <rect x="9" y="9" width="2" height="1" fill="#0a0a10"/>
  <rect x="5" y="9" width="4" height="1" fill="#0a0a10"/>

  <!-- Goatee (narrowing point) -->
  <rect x="5" y="10" width="4" height="1" fill="#0a0a10"/>
  <rect x="6" y="11" width="2" height="1" fill="#0a0a10"/>
  <rect x="6" y="12" width="2" height="1" fill="#0a0a10"/>
  <rect x="6" y="13" width="2" height="1" fill="#0a0a10"/>
</svg>
