name: Sync profile README

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'profile-repo/**'
      - 'PROFILE_README.md'
      - 'assets/profile-banner.svg'
      - '.github/workflows/sync-profile-readme.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v4

      - name: Verify profile sync token
        env:
          PROFILE_REPO_TOKEN: ${{ secrets.PROFILE_REPO_TOKEN }}
        run: |
          if [ -z "$PROFILE_REPO_TOKEN" ]; then
            echo "::error::PROFILE_REPO_TOKEN is not set. Add a fine-grained PAT with Contents write on KM-it-ops/KM-it-ops."
            echo "See docs/PROFILE_SYNC_ONE_TIME.md"
            exit 1
          fi

      - name: Checkout profile repository
        uses: actions/checkout@v4
        with:
          repository: KM-it-ops/KM-it-ops
          token: ${{ secrets.PROFILE_REPO_TOKEN }}
          path: profile-target

      - name: Copy Masked Signal profile files
        run: |
          cp profile-repo/README.md profile-target/README.md
          mkdir -p profile-target/assets
          cp profile-repo/assets/profile-banner.svg profile-target/assets/profile-banner.svg

      - name: Commit and push profile README
        working-directory: profile-target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/profile-banner.svg
          if git diff --staged --quiet; then
            echo "Profile README already up to date."
            exit 0
          fi
          git commit -m "Sync profile README from KM-it-ops.github.io (Masked Signal brand)"
          git push origin main
